name: Daily Restaurant Research

on:
  schedule:
    - cron: '0 16 * * *'  # 9 AM PT / 16:00 UTC
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Research Restaurants
        env:
          OPENCLAW_API_KEY: ${{ secrets.OPENCLAW_API_KEY }}
        run: |
          # This will be replaced with actual OpenClaw API call
          # For now, we'll use a placeholder that generates sample data
          node src/research.js
      
      - name: Build Site
        run: node src/build.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
